name: Deploy to bianamur.be

# Strategie : build local sur le runner GitHub, FTP-deploy vers
# l'hebergement mutualise. Migrations + cache via endpoints HTTP
# proteges par BIA_DEPLOY_SECRET (pas de SSH disponible).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + FTP + post-deploy hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── PHP + Composer ───────────────────────────────────────────────
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, mysql, pdo_mysql, zip, exif, fileinfo, bcmath, openssl, dom, curl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Composer install (prod)
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --classmap-authoritative \
            --no-interaction \
            --no-progress \
            --ignore-platform-reqs

      # ─── Node + npm ───────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      # ─── Generation du .env de prod ─────────────────────────────────────
      # On cree un .env complet a partir des GitHub Secrets, qui sera
      # uploade tel quel via FTP. Vite a besoin de certaines vars (VITE_*)
      # AVANT le build, donc on cree le .env d'abord.
      - name: Generate production .env
        run: |
          cat > .env <<EOF
          APP_NAME="Bia Namur"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_TIMEZONE=Europe/Brussels
          APP_URL=${{ secrets.APP_URL }}
          APP_LOCALE=fr
          APP_FALLBACK_LOCALE=fr
          APP_FAKER_LOCALE=fr_BE

          LOG_CHANNEL=stack
          LOG_LEVEL=warning

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_DOMAIN=${{ secrets.SESSION_DOMAIN }}

          QUEUE_CONNECTION=database
          CACHE_STORE=database

          MAIL_MAILER=${{ secrets.MAIL_MAILER }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=contact@bianamur.be
          MAIL_FROM_NAME="Bia Namur"

          BIA_AI_MOCK_MODE=false
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

          BIA_PUSH_ENABLED=true
          BIA_PUSH_FAKE=false
          BIA_VAPID_PUBLIC_KEY=${{ secrets.BIA_VAPID_PUBLIC_KEY }}
          BIA_VAPID_PRIVATE_KEY=${{ secrets.BIA_VAPID_PRIVATE_KEY }}
          BIA_VAPID_SUBJECT=mailto:contact@bianamur.be

          BIA_CLOUDFLARE_BEACON_TOKEN=${{ secrets.BIA_CLOUDFLARE_BEACON_TOKEN }}

          BIA_DEPLOY_SECRET=${{ secrets.BIA_DEPLOY_SECRET }}
          EOF

      - name: Build frontend (Vite + PWA)
        run: npm run build

      # ─── Optimize Laravel (caches generes localement, uploades via FTP) ─
      - name: Optimize Laravel caches
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      # ─── FTP Deploy ───────────────────────────────────────────────────
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Garde les uploads users + logs deja en place. Skip les fichiers
          # de dev qui ne servent a rien en prod.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env.example
            **/.env.production.example
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/app/private/**
            **/storage/app/public/uploads/**
            **/scripts/**
            **/assets-logo/**
            **/.editorconfig
            **/.gitignore
            **/.gitattributes
            **/phpunit.xml
            **/pint.json
            **/postcss.config.js
            **/tailwind.config.js
            **/vite.config.js
            **/CLAUDE.md
            **/DEPLOYMENT.md
            **/brief-bia-namur.md
            **/secrets-bia-namur.md
            **/README.md
            **/BOIP-DOSSIER.md
            **/bianamur_deploy*

      # ─── Post-deploy via endpoints HTTP ───────────────────────────────
      - name: Run migrations via /_deploy/migrate
        run: |
          curl -fsS -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            "${{ secrets.APP_URL }}/_deploy/migrate" \
            || (echo "::error::Migration failed" && exit 1)

      - name: Refresh caches + opcache via /_deploy/cache
        run: |
          curl -fsS -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            "${{ secrets.APP_URL }}/_deploy/cache" \
            || (echo "::warning::Cache refresh failed (non-blocking)")

      - name: Storage symlink (idempotent)
        run: |
          curl -fsS -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            "${{ secrets.APP_URL }}/_deploy/storage-link" \
            || (echo "::warning::Storage symlink already exists or failed (non-blocking)")

      # ─── Smoke test ────────────────────────────────────────────────────
      - name: Smoke test homepage
        run: |
          curl -fsS -I "${{ secrets.APP_URL }}/" \
            | head -5 \
            && echo "Homepage OK" \
            || (echo "::error::Homepage smoke test failed" && exit 1)
