name: Deploy to bianamur.be

# Strategie : build local sur runner GitHub, ARCHIVE en tar.gz,
# UPLOAD UNIQUE de l'archive via FTP (~50MB en 2min vs 4h+ pour
# 10000 fichiers individuels), EXTRACTION cote serveur via endpoint
# PHP. Migrations + cache via curl POST.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + tar.gz + FTP single + extract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # â”€â”€â”€ PHP + Composer â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, mysql, pdo_mysql, zip, exif, fileinfo, bcmath, openssl, dom, curl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Composer install (prod)
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --classmap-authoritative \
            --no-interaction \
            --no-progress \
            --ignore-platform-reqs

      # â”€â”€â”€ Node + npm â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      # â”€â”€â”€ Generation .env de prod (avant build car Vite lit VITE_*) â”€â”€â”€â”€
      - name: Generate production .env
        run: |
          cat > .env <<EOF
          APP_NAME="Bia Namur"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_TIMEZONE=Europe/Brussels
          APP_URL=${{ secrets.APP_URL }}
          APP_LOCALE=fr
          APP_FALLBACK_LOCALE=fr
          APP_FAKER_LOCALE=fr_BE

          LOG_CHANNEL=stack
          LOG_LEVEL=warning

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_DOMAIN=${{ secrets.SESSION_DOMAIN }}

          QUEUE_CONNECTION=database
          CACHE_STORE=database

          MAIL_MAILER=${{ secrets.MAIL_MAILER }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=contact@bianamur.be
          MAIL_FROM_NAME="Bia Namur"

          BIA_AI_MOCK_MODE=false
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

          BIA_PUSH_ENABLED=true
          BIA_PUSH_FAKE=false
          BIA_VAPID_PUBLIC_KEY=${{ secrets.BIA_VAPID_PUBLIC_KEY }}
          BIA_VAPID_PRIVATE_KEY=${{ secrets.BIA_VAPID_PRIVATE_KEY }}
          BIA_VAPID_SUBJECT=mailto:contact@bianamur.be

          BIA_CLOUDFLARE_BEACON_TOKEN=${{ secrets.BIA_CLOUDFLARE_BEACON_TOKEN }}

          BIA_DEPLOY_SECRET=${{ secrets.BIA_DEPLOY_SECRET }}
          EOF

      - name: Build frontend (Vite + PWA)
        run: npm run build

      # âš ď¸Ź On ne fait PAS artisan config:cache localement : les chemins
      # absolus seraient ceux du runner GitHub, pas du serveur. La cache
      # est generee a destination via /_deploy/cache apres extraction.

      # â”€â”€â”€ Creer l'archive de deploiement (tar.gz) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # On exclut tout ce qui n'a pas a aller en prod : tests, dev,
      # node_modules (le build est dans public/build), assets-logo, etc.
      - name: Create deployment archive
        run: |
          mkdir -p _ftp_stage

          tar -czf _ftp_stage/bia-deploy.tar.gz \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.gitignore' \
            --exclude='./.gitattributes' \
            --exclude='./.editorconfig' \
            --exclude='./.env.example' \
            --exclude='./.env.production.example' \
            --exclude='./node_modules' \
            --exclude='./tests' \
            --exclude='./scripts' \
            --exclude='./assets-logo' \
            --exclude='./_ftp_stage' \
            --exclude='./storage/logs/*.log' \
            --exclude='./storage/framework/cache/data/*' \
            --exclude='./storage/framework/sessions/*' \
            --exclude='./storage/framework/views/*' \
            --exclude='./storage/framework/testing' \
            --exclude='./storage/app/private' \
            --exclude='./storage/app/public/uploads/*' \
            --exclude='./CLAUDE.md' \
            --exclude='./DEPLOYMENT.md' \
            --exclude='./brief-bia-namur.md' \
            --exclude='./secrets-bia-namur.md' \
            --exclude='./README.md' \
            --exclude='./BOIP-DOSSIER.md' \
            --exclude='./bianamur_deploy*' \
            --exclude='./*.pem' \
            --exclude='./id_rsa*' \
            --exclude='./id_ed25519*' \
            --exclude='./phpunit.xml' \
            --exclude='./pint.json' \
            --exclude='./tailwind.config.js' \
            --exclude='./postcss.config.js' \
            --exclude='./vite.config.js' \
            --exclude='./package.json' \
            --exclude='./package-lock.json' \
            .

          ls -lh _ftp_stage/bia-deploy.tar.gz
          echo "Archive size: $(du -h _ftp_stage/bia-deploy.tar.gz | cut -f1)"

      # â”€â”€â”€ Generer l'extractor PHP standalone â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Pour le 1er deploy ou si Laravel ne tourne pas. Pas de dependance
      # Laravel : utilise tar -xzf (shell) car PharData::extractTo plante
      # sur les entrees './' dans nos archives ("Cannot extract '.' internal").
      # Verifie le secret partage via hash_equals (timing-safe).
      - name: Create standalone PHP extractor
        env:
          INJECTED_SECRET: ${{ secrets.BIA_DEPLOY_SECRET }}
        run: |
          cat > _ftp_stage/_extract.php <<'PHPEOF'
          <?php
          // Bia Namur â€” Extractor de deploiement standalone (no Laravel deps).

          $expectedSecret = '###BIA_DEPLOY_SECRET###';

          $received = $_POST['secret'] ?? $_GET['secret'] ?? '';
          if (! $received || ! hash_equals($expectedSecret, $received)) {
              http_response_code(404);
              exit;
          }

          @ini_set('memory_limit', '512M');
          @set_time_limit(600);
          header('Content-Type: text/plain; charset=utf-8');

          $archive = __DIR__ . '/bia-deploy.tar.gz';
          if (! is_file($archive)) {
              http_response_code(500);
              echo "ERROR: archive not found\n";
              exit;
          }

          echo "Archive : " . filesize($archive) . " bytes\n";

          // Extraction via tar shell (PharData plante sur entrees ./).
          $cmd = 'tar -xzf ' . escapeshellarg($archive)
              . ' -C ' . escapeshellarg(__DIR__) . ' 2>&1';
          $output = [];
          $rc = 0;
          exec($cmd, $output, $rc);
          if ($rc !== 0) {
              http_response_code(500);
              echo "tar FAILED rc=$rc\n";
              echo implode("\n", $output) . "\n";
              exit;
          }
          echo "Extraction OK (tar shell)\n";

          @unlink($archive);
          echo "Archive supprimee\n";

          foreach (['storage', 'bootstrap/cache'] as $dir) {
              $p = __DIR__ . '/' . $dir;
              if (is_dir($p)) {
                  @chmod($p, 0775);
                  echo "chmod 775 $dir\n";
              }
          }

          if (function_exists('opcache_reset')) {
              opcache_reset();
              echo "OPcache reset\n";
          }

          @unlink(__FILE__);
          echo "Self-deleted\nDONE\n";
          PHPEOF

          sed -i "s|###BIA_DEPLOY_SECRET###|$INJECTED_SECRET|g" _ftp_stage/_extract.php

          if grep -q '###BIA_DEPLOY_SECRET###' _ftp_stage/_extract.php; then
            echo "::error::Secret injection failed"
            exit 1
          fi
          echo "Extractor genere"
          ls -lh _ftp_stage/

      # â”€â”€â”€ FTP upload (archive + extractor, ~50 MB, ~2 min) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # IMPORTANT : state-name unique par run (run_id) car _extract.php
      # s'auto-delete cote serveur apres usage. Sans state-name unique,
      # FTP Deploy Action skip le fichier car son state dit "deja deploye"
      # â†’ l'extractor est absent â†’ step suivant (curl extract) plante en 404.
      #
      # PAS de dangerous-clean-slate : ca efface TOUT le contenu du
      # server-dir avant d'uploader nos 2 fichiers, ce qui detruit toute
      # l'app Laravel (storage, .env, vendor, etc.). Apprends dans la douleur.
      - name: Upload archive via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_ftp_stage/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # State name unique par run â†’ force upload de nos 2 fichiers
          state-name: .ftp-deploy-${{ github.run_id }}.json
          dangerous-clean-slate: false

      # â”€â”€â”€ Extract sur le serveur (via le standalone _extract.php) â”€â”€â”€â”€â”€
      # -L : suit les redirects (HTTPâ†’HTTPS notamment)
      # -w "%{http_code}" : log le code HTTP final pour debug
      # On capture stdout pour le voir dans les logs Actions.
      - name: Extract archive via /_extract.php
        run: |
          set -e
          echo "Calling _extract.php standalone..."
          HTTP_CODE=$(curl -sS -L --max-time 600 -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            -w "\n=== HTTP_CODE: %{http_code} ===\n" \
            -o /tmp/extract-output.txt \
            "${{ secrets.APP_URL }}/_extract.php" || echo "curl-failed")

          echo "Server response:"
          cat /tmp/extract-output.txt || echo "(no output)"
          echo "$HTTP_CODE"

          # Verif : on doit avoir HTTP 200 et "DONE" dans la reponse
          if grep -q "DONE" /tmp/extract-output.txt; then
            echo "Extract: SUCCESS"
          else
            echo "::error::Extract didn't complete properly (no DONE marker)"
            exit 1
          fi

      # â”€â”€â”€ Post-deploy via endpoints HTTP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Run migrations
        run: |
          set -e
          curl -sS -L --max-time 300 -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            -o /tmp/migrate-output.txt \
            -w "\n=== HTTP_CODE: %{http_code} ===\n" \
            "${{ secrets.APP_URL }}/_deploy/migrate"
          cat /tmp/migrate-output.txt

      - name: Refresh caches + opcache
        run: |
          curl -sS -L --max-time 60 -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            -o /tmp/cache-output.txt \
            "${{ secrets.APP_URL }}/_deploy/cache" || true
          cat /tmp/cache-output.txt || true

      - name: Storage symlink
        run: |
          curl -sS -L --max-time 60 -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            -o /tmp/symlink-output.txt \
            "${{ secrets.APP_URL }}/_deploy/storage-link" || true
          cat /tmp/symlink-output.txt || true

      # â”€â”€â”€ Smoke test â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Smoke test homepage
        run: |
          curl -fsS -I "${{ secrets.APP_URL }}/" \
            | head -5 \
            && echo "Homepage OK" \
            || (echo "::error::Homepage smoke test failed" && exit 1)
