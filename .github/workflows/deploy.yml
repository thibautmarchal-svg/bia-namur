name: Deploy to bianamur.be

# Strategie : build local sur runner GitHub, ARCHIVE en tar.gz,
# UPLOAD UNIQUE de l'archive via FTP (~50MB en 2min vs 4h+ pour
# 10000 fichiers individuels), EXTRACTION cote serveur via endpoint
# PHP. Migrations + cache via curl POST.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + tar.gz + FTP single + extract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── PHP + Composer ───────────────────────────────────────────────
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, mysql, pdo_mysql, zip, exif, fileinfo, bcmath, openssl, dom, curl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-prod-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-

      - name: Composer install (prod)
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --classmap-authoritative \
            --no-interaction \
            --no-progress \
            --ignore-platform-reqs

      # ─── Node + npm ───────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      # ─── Generation .env de prod (avant build car Vite lit VITE_*) ────
      - name: Generate production .env
        run: |
          cat > .env <<EOF
          APP_NAME="Bia Namur"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_TIMEZONE=Europe/Brussels
          APP_URL=${{ secrets.APP_URL }}
          APP_LOCALE=fr
          APP_FALLBACK_LOCALE=fr
          APP_FAKER_LOCALE=fr_BE

          LOG_CHANNEL=stack
          LOG_LEVEL=warning

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_DOMAIN=${{ secrets.SESSION_DOMAIN }}

          QUEUE_CONNECTION=database
          CACHE_STORE=database

          MAIL_MAILER=${{ secrets.MAIL_MAILER }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=contact@bianamur.be
          MAIL_FROM_NAME="Bia Namur"

          BIA_AI_MOCK_MODE=false
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

          BIA_PUSH_ENABLED=true
          BIA_PUSH_FAKE=false
          BIA_VAPID_PUBLIC_KEY=${{ secrets.BIA_VAPID_PUBLIC_KEY }}
          BIA_VAPID_PRIVATE_KEY=${{ secrets.BIA_VAPID_PRIVATE_KEY }}
          BIA_VAPID_SUBJECT=mailto:contact@bianamur.be

          BIA_CLOUDFLARE_BEACON_TOKEN=${{ secrets.BIA_CLOUDFLARE_BEACON_TOKEN }}

          BIA_DEPLOY_SECRET=${{ secrets.BIA_DEPLOY_SECRET }}
          EOF

      - name: Build frontend (Vite + PWA)
        run: npm run build

      - name: Optimize Laravel caches
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      # ─── Creer l'archive de deploiement (tar.gz) ──────────────────────
      # On exclut tout ce qui n'a pas a aller en prod : tests, dev,
      # node_modules (le build est dans public/build), assets-logo, etc.
      - name: Create deployment archive
        run: |
          mkdir -p _ftp_stage

          tar -czf _ftp_stage/bia-deploy.tar.gz \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.gitignore' \
            --exclude='./.gitattributes' \
            --exclude='./.editorconfig' \
            --exclude='./.env.example' \
            --exclude='./.env.production.example' \
            --exclude='./node_modules' \
            --exclude='./tests' \
            --exclude='./scripts' \
            --exclude='./assets-logo' \
            --exclude='./_ftp_stage' \
            --exclude='./storage/logs/*.log' \
            --exclude='./storage/framework/cache/data/*' \
            --exclude='./storage/framework/sessions/*' \
            --exclude='./storage/framework/views/*' \
            --exclude='./storage/framework/testing' \
            --exclude='./storage/app/private' \
            --exclude='./storage/app/public/uploads/*' \
            --exclude='./CLAUDE.md' \
            --exclude='./DEPLOYMENT.md' \
            --exclude='./brief-bia-namur.md' \
            --exclude='./secrets-bia-namur.md' \
            --exclude='./README.md' \
            --exclude='./BOIP-DOSSIER.md' \
            --exclude='./bianamur_deploy*' \
            --exclude='./*.pem' \
            --exclude='./id_rsa*' \
            --exclude='./id_ed25519*' \
            --exclude='./phpunit.xml' \
            --exclude='./pint.json' \
            --exclude='./tailwind.config.js' \
            --exclude='./postcss.config.js' \
            --exclude='./vite.config.js' \
            --exclude='./package.json' \
            --exclude='./package-lock.json' \
            .

          ls -lh _ftp_stage/bia-deploy.tar.gz
          echo "Archive size: $(du -h _ftp_stage/bia-deploy.tar.gz | cut -f1)"

      # ─── Generer l'extractor PHP standalone ──────────────────────────
      # Pour le 1er deploy ou si Laravel ne tourne pas. Pas de dependance
      # Laravel : simple PharData::extractTo + chmod + opcache_reset.
      # Verifie le secret partage via hash_equals (timing-safe).
      - name: Create standalone PHP extractor
        env:
          INJECTED_SECRET: ${{ secrets.BIA_DEPLOY_SECRET }}
        run: |
          cat > _ftp_stage/_extract.php <<'PHPEOF'
          <?php
          // Bia Namur — Extractor de deploiement standalone (no Laravel deps).

          $expectedSecret = '###BIA_DEPLOY_SECRET###';

          $received = $_POST['secret'] ?? $_GET['secret'] ?? '';
          if (! $received || ! hash_equals($expectedSecret, $received)) {
              http_response_code(404);
              exit;
          }

          @ini_set('memory_limit', '512M');
          @set_time_limit(600);
          header('Content-Type: text/plain; charset=utf-8');

          $archive = __DIR__ . '/bia-deploy.tar.gz';
          if (! is_file($archive)) {
              http_response_code(500);
              echo "ERROR: archive not found\n";
              exit;
          }

          echo "Archive : " . filesize($archive) . " bytes\n";

          try {
              $phar = new \PharData($archive);
              $phar->extractTo(__DIR__, null, true);
              echo "Extraction OK\n";

              @unlink($archive);
              echo "Archive supprimee\n";

              foreach (['storage', 'bootstrap/cache'] as $dir) {
                  $p = __DIR__ . '/' . $dir;
                  if (is_dir($p)) {
                      @chmod($p, 0775);
                      echo "chmod 775 $dir\n";
                  }
              }

              if (function_exists('opcache_reset')) {
                  opcache_reset();
                  echo "OPcache reset\n";
              }

              @unlink(__FILE__);
              echo "Self-deleted\nDONE\n";
          } catch (\Throwable $e) {
              http_response_code(500);
              echo "FAILED: " . $e->getMessage() . "\n";
          }
          PHPEOF

          sed -i "s|###BIA_DEPLOY_SECRET###|$INJECTED_SECRET|g" _ftp_stage/_extract.php

          if grep -q '###BIA_DEPLOY_SECRET###' _ftp_stage/_extract.php; then
            echo "::error::Secret injection failed"
            exit 1
          fi
          echo "Extractor genere"
          ls -lh _ftp_stage/

      # ─── FTP upload (archive + extractor, ~50 MB, ~2 min) ─────────────
      - name: Upload archive via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_ftp_stage/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Pas de state file car 1 seul fichier a chaque fois
          state-name: .ftp-deploy-archive-state.json
          # Pas d'exclusion necessaire, le local-dir contient juste l'archive
          dangerous-clean-slate: false

      # ─── Extract sur le serveur (via le standalone _extract.php) ─────
      # Le standalone extract est upload avec l'archive et marche meme
      # si Laravel n'est pas (encore) installe. Apres extraction, il
      # se supprime lui-meme.
      - name: Extract archive via /_extract.php
        run: |
          set -e
          echo "Calling _extract.php standalone..."
          curl --max-time 600 -fsS -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            "${{ secrets.APP_URL }}/_extract.php" \
            || (echo "::error::Extract failed" && exit 1)

      # ─── Post-deploy via endpoints HTTP ───────────────────────────────
      - name: Run migrations
        run: |
          curl --max-time 300 -fsS -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            "${{ secrets.APP_URL }}/_deploy/migrate" \
            || (echo "::error::Migration failed" && exit 1)

      - name: Refresh caches + opcache
        run: |
          curl --max-time 60 -fsS -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            "${{ secrets.APP_URL }}/_deploy/cache" \
            || (echo "::warning::Cache refresh failed (non-blocking)")

      - name: Storage symlink
        run: |
          curl --max-time 60 -fsS -X POST \
            -d "secret=${{ secrets.BIA_DEPLOY_SECRET }}" \
            "${{ secrets.APP_URL }}/_deploy/storage-link" \
            || (echo "::warning::Storage symlink already exists or failed (non-blocking)")

      # ─── Smoke test ────────────────────────────────────────────────────
      - name: Smoke test homepage
        run: |
          curl -fsS -I "${{ secrets.APP_URL }}/" \
            | head -5 \
            && echo "Homepage OK" \
            || (echo "::error::Homepage smoke test failed" && exit 1)
