name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint PHP (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Laravel Pint (lint check)
        run: ./vendor/bin/pint --test

  test:
    name: Tests Pest (PHP 8.3 + MySQL 8)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: bia_namur_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: bia_namur_testing
      DB_USERNAME: root
      DB_PASSWORD: ''
      BIA_AI_MOCK_MODE: 'true'
      ANTHROPIC_API_KEY: 'sk-ant-test-fake'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, gd, mysql, pdo_mysql, zip, exif, fileinfo
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Wait for MySQL ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot --silent && break
            echo "Waiting MySQL ($i/30)..."
            sleep 2
          done

      - name: Run Pest test suite
        run: ./vendor/bin/pest --colors=never

  build:
    name: Build Vite (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci --no-audit --no-fund

      - name: Run Vite build (prod)
        run: npm run build

      - name: Vérif manifest généré
        run: |
          test -f public/build/manifest.json
          test -f public/build/sw.js
          test -f public/build/manifest.webmanifest
          echo "Build artifacts OK"
