<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bia Namur — Échasseur namurois">
  <title>Bia Namur — Échasseur</title>

  <!-- Fond crème arrondi -->
  <rect width="512" height="512" rx="80" fill="#F5EDDC"/>

  <!-- Silhouette de l'échasseur en ambré (Mélan / Avresse stylisé) -->
  <g fill="#C77F2C">

    <!-- Plume sur la casquette (touche folklorique) -->
    <path d="M 270 56 Q 286 46, 294 40 Q 286 56, 274 80 Z"/>

    <!-- Casquette (chapeau plat traditionnel) -->
    <ellipse cx="256" cy="86" rx="36" ry="10"/>
    <path d="M 224 86 L 224 80 Q 226 70, 256 70 Q 286 70, 288 80 L 288 86 Z"/>

    <!-- Tête -->
    <circle cx="256" cy="114" r="22"/>

    <!-- Cou -->
    <rect x="247" y="134" width="18" height="8"/>

    <!-- Torse (veste cintrée) -->
    <path d="M 224 144
             Q 216 162, 220 220
             L 292 220
             Q 296 162, 288 144
             Q 272 138, 256 138
             Q 240 138, 224 144 Z"/>

    <!-- Ceinture -->
    <rect x="220" y="216" width="72" height="6" rx="1"/>

    <!-- Culotte / pantalon court (knee-breeches) -->
    <path d="M 220 224
             Q 214 246, 220 270
             L 250 270
             Q 250 246, 250 224 Z"/>
    <path d="M 262 224
             L 292 224
             Q 298 246, 292 270
             L 262 270 Z"/>

    <!-- Bras tenant les échasses (un legerement plus haut pour suggerer le mouvement) -->
    <path d="M 222 154
             L 188 192
             L 202 206
             L 230 168 Z"/>
    <path d="M 290 154
             L 324 192
             L 310 206
             L 282 168 Z"/>

    <!-- Échasse gauche (longue, descend bien plus bas que le corps) -->
    <path d="M 182 184
             L 196 184
             L 200 460
             L 186 460 Z"/>

    <!-- Échasse droite -->
    <path d="M 316 184
             L 330 184
             L 326 460
             L 312 460 Z"/>

    <!-- Plateformes pour les pieds (a hauteur du genou) -->
    <path d="M 168 252
             L 214 252
             L 212 262
             L 170 262 Z"/>
    <path d="M 298 252
             L 344 252
             L 342 262
             L 300 262 Z"/>

  </g>
</svg>
