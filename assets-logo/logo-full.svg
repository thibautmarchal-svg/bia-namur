    <path d="M 270 56 Q 286 46, 294 40 Q 286 56, 274 80 Z"/>
    <ellipse cx="256" cy="86" rx="36" ry="10"/>
    <path d="M 224 86 L 224 80 Q 226 70, 256 70 Q 286 70, 288 80 L 288 86 Z"/>
    <circle cx="256" cy="114" r="22"/>
    <rect x="247" y="134" width="18" height="8"/>
    <path d="M 224 144 Q 216 162, 220 220 L 292 220 Q 296 162, 288 144 Q 272 138, 256 138 Q 240 138, 224 144 Z"/>
    <rect x="220" y="216" width="72" height="6" rx="1"/>
    <path d="M 220 224 Q 214 246, 220 270 L 250 270 Q 250 246, 250 224 Z"/>
    <path d="M 262 224 L 292 224 Q 298 246, 292 270 L 262 270 Z"/>
    <path d="M 222 154 L 188 192 L 202 206 L 230 168 Z"/>
    <path d="M 290 154 L 324 192 L 310 206 L 282 168 Z"/>
    <path d="M 182 184 L 196 184 L 200 460 L 186 460 Z"/>
    <path d="M 316 184 L 330 184 L 326 460 L 312 460 Z"/>
    <path d="M 168 252 L 214 252 L 212 262 L 170 262 Z"/>
    <path d="M 298 252 L 344 252 L 342 262 L 300 262 Z"/>
